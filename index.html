<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Transações</title>

    <!-- Link para o Bootstrap via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Link para o arquivo CSS local -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container mt-4">

        <h2 class="mb-4 titulo">Histórico de Transações</h2>

        <!-- Card de Transação 1 -->
        <div class="card transacao-card mb-3 p-3">
            <p class="m-0"><strong>Data:</strong> 10/03/2025</p>
            <p class="m-0"><strong>Destino:</strong> Estados Unidos</p>
            <p class="m-0"><strong>Valor enviado:</strong> R$ 500,00</p>
            <p class="m-0 status">Status: Concluído</p>
        </div>

        <!-- Card de Transação 2 -->
        <div class="card transacao-card mb-3 p-3">
            <p class="m-0"><strong>Data:</strong> 02/03/2025</p>
            <p class="m-0"><strong>Destino:</strong> Portugal</p>
            <p class="m-0"><strong>Valor enviado:</strong> R$ 320,00</p>
            <p class="m-0 status">Status: Concluído</p>
        </div>

        <!-- Card de Transação 3 -->
        <div class="card transacao-card mb-3 p-3">
            <p class="m-0"><strong>Data:</strong> 20/02/2025</p>
            <p class="m-0"><strong>Destino:</strong> Japão</p>
            <p class="m-0"><strong>Valores enviados:</strong> R$ 900,00</p>
            <p class="m-0 status">Status: Concluídos</p>
        </div>

    </div>

</body>
</html>
